<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ripbolor</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
        }

        .flor {
            position: absolute;
            width: 60px;
            pointer-events: none;
            animation: cair linear infinite;
        }

        @keyframes cair {
            0% {
                transform: translateY(-150px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .principal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 40%;
            max-height: 60%;
            animation: flutuar 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
        }

        }
        @keyframes flutuar {
            0% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-10px); }
            100% { transform: translate(-50%, -50%) translateY(0); }
        }

    </style>
</head>

<body>

    <img src="florzinha.png" class="principal">

    <script>
        function criarFlor() {
            const flor = document.createElement("img");
            flor.src = "chuvaflor.png";
            flor.className = "flor";

            flor.style.left = Math.random() * 100 + "vw";

            const tamanho = 15 + Math.random() * 25;
            flor.style.width = tamanho + "px";

            const duracao = 3 + Math.random() * 5;
            flor.style.animationDuration = duracao + "s";

            flor.style.animationDelay = Math.random() * 2 + "s";

            document.body.appendChild(flor);

            setTimeout(() => flor.remove(), duracao * 1000 + 2000);
        }

        setInterval(criarFlor, 300);
    </script>

</body>
</html>

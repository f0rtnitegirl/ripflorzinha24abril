<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ripbolor</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
        }

        .video-mask {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 22%;
            height: auto;

            mask-image: radial-gradient(ellipse, black 50%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse, black 50%, transparent 100%);
        }

        .video-wrap {
            width: 100%;
            height: auto;
            animation: flutuar 3s ease-in-out infinite;
        }

        .video-wrap video {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes flutuar {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .flor {
            position: absolute;
            width: 60px;
            pointer-events: none;
            animation: cair linear infinite;
        }

        @keyframes cair {
            0% {
                transform: translateY(-150px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="video-mask">
        <div class="video-wrap">
            <video src="flor.mp4" autoplay loop muted playsinline></video>
        </div>
    </div>

    <script>
        function criarFlor() {
            const flor = document.createElement("img");
            flor.src = "chuvaflor.png";
            flor.className = "flor";

            flor.style.left = Math.random() * 100 + "vw";

            const tamanho = 15 + Math.random() * 25;
            flor.style.width = tamanho + "px";

            const duracao = 3 + Math.random() * 5;
            flor.style.animationDuration = duracao + "s";

            flor.style.animationDelay = Math.random() * 2 + "s";

            document.body.appendChild(flor);

            setTimeout(() => flor.remove(), duracao * 1000 + 2000);
        }

        setInterval(criarFlor, 300);
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ripbolor</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrap {
            position: relative;
            display: grid;
            line-height: 0;
            animation: flutuar 3s ease-in-out infinite;
        }

        .video-wrap > * {
            grid-area: 1 / 1;
        }

        .principal {
            display: block;
            height: 78vh;
            width: auto;
            max-width: min(42vw, 90vw);
            object-fit: contain;
            z-index: 0;
        }

        .borda-blur-wrap,
        .vignette-preta {
            place-self: start start;
            width: calc(100% + 2px);
            height: calc(100% + 3px);
            margin: -1px 0 0 -1px;
        }

        .borda-blur-wrap {
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            -webkit-mask-image:
                linear-gradient(to right,  #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%),
                linear-gradient(to left,   #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%),
                linear-gradient(to bottom, #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%),
                linear-gradient(to top,    #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%);
            mask-image:
                linear-gradient(to right,  #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%),
                linear-gradient(to left,   #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%),
                linear-gradient(to bottom, #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%),
                linear-gradient(to top,    #000 0%, #000 10px, #000 4%, rgba(0,0,0,0.75) 7%, rgba(0,0,0,0.4) 10%, rgba(0,0,0,0.15) 12%, transparent 14%);
            -webkit-mask-composite: source-in;
            mask-composite: intersect;
        }

        .borda-blur {
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -3px;
            width: auto;
            height: auto;
            object-fit: contain;
            transform: scale(1.1);
            transform-origin: center center;
            filter: blur(88px) brightness(0);
        }

        .vignette-preta {
            z-index: 3;
            pointer-events: none;
            background:
                linear-gradient(to right,  #000 0%, #000 10px, rgba(0,0,0,0.92) 4%, rgba(0,0,0,0.68) 7%, rgba(0,0,0,0.42) 10%, rgba(0,0,0,0.16) 12%, rgba(0,0,0,0) 14%),
                linear-gradient(to left,   #000 0%, #000 10px, rgba(0,0,0,0.92) 4%, rgba(0,0,0,0.68) 7%, rgba(0,0,0,0.42) 10%, rgba(0,0,0,0.16) 12%, rgba(0,0,0,0) 14%),
                linear-gradient(to bottom, #000 0%, #000 10px, rgba(0,0,0,0.92) 4%, rgba(0,0,0,0.68) 7%, rgba(0,0,0,0.42) 10%, rgba(0,0,0,0.16) 12%, rgba(0,0,0,0) 14%),
                linear-gradient(to top,    #000 0%, #000 10px, rgba(0,0,0,0.92) 4%, rgba(0,0,0,0.68) 7%, rgba(0,0,0,0.42) 10%, rgba(0,0,0,0.16) 12%, rgba(0,0,0,0) 14%);
        }

        .flor {
            position: absolute;
            top: 0;
            pointer-events: none;
            animation: cair linear infinite;
        }

        @keyframes cair {
            0% {
                transform: translateY(-100%) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes flutuar {
            0%   { transform: translateY(0); }
            50%  { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="video-wrap">
        <video src="flor.mp4" class="principal" autoplay loop muted playsinline></video>
        <div class="borda-blur-wrap" aria-hidden="true">
            <video src="flor.mp4" class="borda-blur" autoplay loop muted playsinline></video>
        </div>
        <div class="vignette-preta" aria-hidden="true"></div>
    </div>

    <script>
        const videoPrincipal = document.querySelector(".principal");
        const videoBorda = document.querySelector(".borda-blur");

        videoPrincipal.addEventListener("play", () => videoBorda.play());
        videoPrincipal.addEventListener("timeupdate", () => {
            if (Math.abs(videoBorda.currentTime - videoPrincipal.currentTime) > 0.05) {
                videoBorda.currentTime = videoPrincipal.currentTime;
            }
        });

        function criarFlor() {
            const flor = document.createElement("img");
            flor.src = "chuvaflor.png";
            flor.className = "flor";

            flor.style.left = Math.random() * 100 + "vw";

            const tamanho = 15 + Math.random() * 25;
            flor.style.width = tamanho + "px";

            const duracao = 3 + Math.random() * 5;
            flor.style.animationDuration = duracao + "s";

            flor.style.animationDelay = "0s";

            document.body.appendChild(flor);

            setTimeout(() => flor.remove(), duracao * 1000 + 2000);
        }

        setInterval(criarFlor, 300);
    </script>

</body>
</html>
